name: hackku2026
services:
  backend:
    build:
      context: ./backend
    env_file:
      - "./envs/.globals.env"
      - "./envs/.backend.env"
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file:
      - "./envs/.globals.env"
      - "./envs/.frontend.env"
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  db:
    image: postgres:latest
    env_file:
      - "./envs/.globals.env"
      - "./envs/.db.env"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: